<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSFM - Portal Nutricional</title>
    <!-- Google Fonts para um ar mais moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2ecc71;
            --primary-hover: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #34495e;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { 
            background: var(--card-bg); 
            width: 100%;
            max-width: 450px; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); margin-bottom: 25px; }

        /* Abas de navegação */
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .tab-btn { 
            flex: 1; padding: 10px; border: none; background: none; 
            cursor: pointer; font-size: 16px; font-weight: 600; color: #95a5a6;
            transition: 0.3s;
        }
        .tab-btn.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }

        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.4s ease; }

        .campo { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: 600; }
        
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 14px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 5px rgba(46, 204, 113, 0.3); }

        button { 
            background-color: var(--primary-color); color: white; border: none; 
            padding: 14px; width: 100%; cursor: pointer; border-radius: 8px; 
            font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        #resultado { 
            margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 14px;
            display: none; text-align: center; line-height: 1.6;
        }

        .row { display: flex; gap: 10px; }
        .row .campo { flex: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>BSFM Nutri</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('cadastro')">Cadastro</button>
        <button class="tab-btn" onclick="switchTab('login')">Login</button>
    </div>

    <!-- SEÇÃO DE CADASTRO -->
    <div id="cadastro" class="form-section active">
        <div class="campo">
            <label>Nome Completo:</label>
            <input type="text" id="nome" placeholder="Ex: Maria Silva">
        </div>
        <div class="campo">
            <label>E-mail:</label>
            <input type="email" id="email" placeholder="maria@email.com">
        </div>
        <div class="campo">
            <label>Senha:</label>
            <input type="password" id="senha" placeholder="Crie uma senha">
        </div>

        <div class="row">
            <div class="campo">
                <label>Idade:</label>
                <input type="number" id="idade">
            </div>
            <div class="campo">
                <label>Sexo:</label>
                <select id="sexo">
                    <option value="Feminino">Feminino</option>
                    <option value="Masculino">Masculino</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="campo">
                <label>Peso (kg):</label>
                <input type="number" id="peso" step="0.1" placeholder="70">
            </div>
            <div class="campo">
                <label>Altura (m):</label>
                <input type="number" id="altura" step="0.01" placeholder="1.65">
            </div>
        </div>

        <div class="campo">
            <label>Nível de Atividade:</label>
            <select id="atividade">
                <option value="Sedentario">Sedentário</option>
                <option value="Ativo">Ativo</option>
                <option value="Muito Ativo">Muito Ativo</option>
            </select>
        </div>
        <button onclick="cadastrar()">Finalizar Cadastro</button>
    </div>

    <!-- SEÇÃO DE LOGIN -->
    <div id="login" class="form-section">
        <div class="campo">
            <label>E-mail:</label>
            <input type="email" id="login_email" placeholder="Seu e-mail">
        </div>
        <div class="campo">
            <label>Senha:</label>
            <input type="password" id="login_senha" placeholder="Sua senha">
        </div>
        <button onclick="login()" style="background-color: #34495e;">Entrar no Painel</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
    // URL do servidor (Verifique se no seu terminal aparece 5000 ou 5054)
    const API_URL = 'http://localhost:5000';

    function switchTab(tabId) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('resultado').style.display = 'none';
    }

    async function cadastrar() {
        const resDiv = document.getElementById('resultado');
        
        const dados = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            senhaHash: document.getElementById('senha').value, // No C# você criptografa este valor
            idade: parseInt(document.getElementById('idade').value),
            peso: parseFloat(document.getElementById('peso').value),
            altura: parseFloat(document.getElementById('altura').value),
            sexo: document.getElementById('sexo').value,
            tipoPessoa: document.getElementById('atividade').value,
            aceitouTermos: true
        };

        if(!dados.nome || !dados.email || !dados.senhaHash) {
            alert("Preencha Nome, Email e Senha!");
            return;
        }

        try {
            const resp = await fetch(`${API_URL}/cadastrar-usuario`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            const data = await resp.json();
            
            exibirMensagem(`✅ ${data.mensagem}<br>Faça login para continuar.`, "#d4edda", "#155724");
        } catch (err) {
            exibirMensagem("❌ Erro ao conectar com o servidor.", "#f8d7da", "#721c24");
        }
    }

    async function login() {
        const dados = {
            email: document.getElementById('login_email').value,
            senha: document.getElementById('login_senha').value
        };

        try {
            const resp = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (resp.ok) {
                const user = await resp.json();
                exibirMensagem(`🔥 Bem-vindo(a), ${user.nome}!<br>Seu IMC é: ${user.imc}`, "#d4edda", "#155724");
            } else {
                exibirMensagem("⚠️ E-mail ou senha incorretos.", "#fff3cd", "#856404");
            }
        } catch (err) {
            exibirMensagem("❌ Servidor C# offline.", "#f8d7da", "#721c24");
        }
    }

    function exibirMensagem(texto, fundo, cor) {
        const resDiv = document.getElementById('resultado');
        resDiv.style.display = "block";
        resDiv.style.backgroundColor = fundo;
        resDiv.style.color = cor;
        resDiv.innerHTML = texto;
    }
</script>

</body>
</html>

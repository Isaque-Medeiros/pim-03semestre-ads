site_name: BSFM - Brazilian System of Food Metric
site_url: https://bsfm.com.br
site_description: Plataforma revolucionária de nutrição inteligente com IA para transformar a saúde alimentar dos brasileiros
site_author: BSFM Team
copyright: Copyright © 2026-2036 Brazilian System of Food Metric | BSFM

theme:
  name: material
  language: pt-BR
  logo: stylesheets/images/favicon.png
  favicon: stylesheets/images/favicon.png
  palette:
    # Tema escuro (default) e claro (alternativo)
    - scheme: slate
      primary: emerald
      accent: emerald
      toggle:
        icon: material/brightness-4
        name: Modo escuro
    - scheme: default
      primary: emerald
      accent: emerald
      toggle:
        icon: material/brightness-7
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs
    - navigation.expand
    - navigation.indexes
    - navigation.top
  icon:
    repo: fontawesome/brands/github

repo_name: BSFM/Brazilian-System-of-Food-Metric
repo_url: https://github.com/BSFM/Brazilian-System-of-Food-Metric

# Plugins
plugins:
  - search
  - tags

# Extras
extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BSFM
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/bsfm_br
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/bsfm

# Custom CSS
extra_css:
  - stylesheets/extra.css
  - stylesheets/custom.css

# Custom JavaScript
extra_javascript:
  - javascripts/custom.js

# Navigation structure
nav:
  - Home: index.md
  - Sobre o BSFM: docs/sobre/visao-missao.md
  - Guia do Usuário: guia-usuario/introducao.md
  - Guia do Desenvolvedor: guia-desenvolvedor/index.md
  - Casos de Uso: caso-de-uso/index.md
  - Glossário: glossario/index.md
  - Roadmap: roadmap/index.md
  - Changelog: changelog/index.md
